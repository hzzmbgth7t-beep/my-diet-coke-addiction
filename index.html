<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Diet Coke Addiction</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="My Diet Coke Addiction">
  <meta name="theme-color" content="#b30000">

  <style>
    :root {
      --red: #b30000;
      --dark-red: #7d0000;
      --silver: #f1f1f1;
      --text: #1f1f1f;
      --muted: #666;
      --white: #ffffff;
      --border: #dddddd;
      --danger: #a40000;
      --green: #0b7a3b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f3f3f3 100%);
      color: var(--text);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding-bottom: 32px;
    }

    header {
      text-align: center;
      padding: 18px 6px 10px;
    }

    .logo {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 8px 22px rgba(0,0,0,.22);
      background: #fff;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      color: var(--red);
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      margin: 14px 0;
      box-shadow: 0 8px 18px rgba(0,0,0,.07);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      margin-bottom: 14px;
    }

    input:focus {
      outline: 2px solid rgba(179,0,0,.18);
      border-color: var(--red);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 700;
      background: var(--silver);
      color: var(--text);
      cursor: pointer;
    }

    button.selected {
      background: var(--red);
      color: #fff;
    }

    .yes-no {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 14px;
    }

    .save-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      font-size: 18px;
      padding: 15px;
      margin-top: 6px;
    }

    .save-btn.editing {
      background: var(--green);
    }

    .cancel-btn {
      width: 100%;
      background: #555;
      color: #fff;
      margin-top: 9px;
      display: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      text-align: center;
    }

    .summary div {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 6px;
    }

    .summary strong {
      display: block;
      color: var(--red);
      font-size: 22px;
    }

    .summary span {
      font-size: 12px;
      color: var(--muted);
    }

    .entry {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }

    .entry:last-child {
      border-bottom: none;
    }

    .entry-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .entry-title {
      font-weight: 800;
      font-size: 17px;
    }

    .entry-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
      line-height: 1.35;
    }

    .entry-actions {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .small-btn {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .edit-btn {
      background: #e9f2ff;
      color: #064c9b;
    }

    .delete-btn {
      background: #ffe9e9;
      color: var(--danger);
    }

    .clear-btn {
      width: 100%;
      background: #333;
      color: #fff;
      margin-top: 12px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 12px 4px 24px;
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <img src="icon.png" alt="App icon" class="logo" onerror="this.style.display='none'">
      <h1>My Diet Coke Addiction</h1>
      <div class="subtitle">Private drink tracker saved on this device</div>
    </header>

    <section class="card">
      <label for="drinkName">Drink Name</label>
      <input id="drinkName" type="text" placeholder="Example: Diet Coke" autocomplete="off" />

      <label>Ounces</label>
      <div class="button-grid" id="ounceButtons">
        <button type="button" data-ounces="8">8 oz</button>
        <button type="button" data-ounces="12">12 oz</button>
        <button type="button" data-ounces="16">16 oz</button>
        <button type="button" data-ounces="20">20 oz</button>
        <button type="button" data-ounces="24">24 oz</button>
        <button type="button" data-ounces="32">32 oz</button>
      </div>

      <label for="manualOunces">Manual Ounces</label>
      <input id="manualOunces" type="number" placeholder="Or type a number" min="1" step="0.1" inputmode="decimal" />
      <div class="hint">Use a button or type your own amount.</div>

      <label>Caffeinated?</label>
      <div class="yes-no" id="caffeineButtons">
        <button type="button" data-value="Yes">Yes</button>
        <button type="button" data-value="No">No</button>
      </div>

      <label>Clear?</label>
      <div class="yes-no" id="clearButtons">
        <button type="button" data-value="Yes">Yes</button>
        <button type="button" data-value="No">No</button>
      </div>

      <button id="saveBtn" class="save-btn" type="button">Save Entry</button>
      <button id="cancelEditBtn" class="cancel-btn" type="button">Cancel Edit</button>
    </section>

    <section class="card">
      <label>Today</label>
      <div class="summary">
        <div>
          <strong id="todayOunces">0</strong>
          <span>ounces</span>
        </div>
        <div>
          <strong id="todayCount">0</strong>
          <span>entries</span>
        </div>
        <div>
          <strong id="todayCaffeine">0</strong>
          <span>caffeinated</span>
        </div>
      </div>
    </section>

    <section class="card">
      <label>Saved Entries</label>
      <div id="entriesList"></div>
      <button id="clearAllBtn" class="clear-btn" type="button">Delete All Entries</button>
    </section>

    <footer>
      Version 1.1 — stored locally in your browser
    </footer>
  </main>

  <script>
    const STORAGE_KEY = "myDietCokeAddictionEntries";

    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let selectedOunces = null;
    let selectedCaffeine = null;
    let selectedClear = null;
    let editingId = null;

    const drinkNameInput = document.getElementById("drinkName");
    const manualOuncesInput = document.getElementById("manualOunces");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const entriesList = document.getElementById("entriesList");

    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function selectButton(groupId, value) {
      const group = document.getElementById(groupId);
      group.querySelectorAll("button").forEach(button => {
        button.classList.toggle("selected", button.dataset.value === value || button.dataset.ounces === String(value));
      });
    }

    document.querySelectorAll("#ounceButtons button").forEach(button => {
      button.addEventListener("click", () => {
        selectedOunces = Number(button.dataset.ounces);
        manualOuncesInput.value = "";
        selectButton("ounceButtons", selectedOunces);
      });
    });

    manualOuncesInput.addEventListener("input", () => {
      if (manualOuncesInput.value) {
        selectedOunces = null;
        document.querySelectorAll("#ounceButtons button").forEach(button => button.classList.remove("selected"));
      }
    });

    document.querySelectorAll("#caffeineButtons button").forEach(button => {
      button.addEventListener("click", () => {
        selectedCaffeine = button.dataset.value;
        selectButton("caffeineButtons", selectedCaffeine);
      });
    });

    document.querySelectorAll("#clearButtons button").forEach(button => {
      button.addEventListener("click", () => {
        selectedClear = button.dataset.value;
        selectButton("clearButtons", selectedClear);
      });
    });

    function resetForm() {
      drinkNameInput.value = "";
      manualOuncesInput.value = "";
      selectedOunces = null;
      selectedCaffeine = null;
      selectedClear = null;
      editingId = null;

      document.querySelectorAll("button.selected").forEach(button => button.classList.remove("selected"));
      saveBtn.textContent = "Save Entry";
      saveBtn.classList.remove("editing");
      cancelEditBtn.style.display = "none";
    }

    function getTodayString(dateValue = new Date()) {
      const date = new Date(dateValue);
      return date.toLocaleDateString();
    }

    function renderEntries() {
      entries.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (!entries.length) {
        entriesList.innerHTML = '<div class="empty">No entries yet.</div>';
      } else {
        entriesList.innerHTML = entries.map(entry => `
          <div class="entry">
            <div class="entry-top">
              <div>
                <div class="entry-title">${escapeHtml(entry.name)} — ${entry.ounces} oz</div>
                <div class="entry-meta">
                  Caffeinated: ${entry.caffeinated} · Clear: ${entry.clear}<br>
                  ${new Date(entry.createdAt).toLocaleString()}
                </div>
              </div>
              <div class="entry-actions">
                <button class="small-btn edit-btn" type="button" onclick="editEntry(${entry.id})">Edit</button>
                <button class="small-btn delete-btn" type="button" onclick="deleteEntry(${entry.id})">Delete</button>
              </div>
            </div>
          </div>
        `).join("");
      }

      updateSummary();
    }

    function updateSummary() {
      const today = getTodayString();

      const todaysEntries = entries.filter(entry => getTodayString(entry.createdAt) === today);
      const todayOunces = todaysEntries.reduce((sum, entry) => sum + Number(entry.ounces || 0), 0);
      const todayCaffeine = todaysEntries.filter(entry => entry.caffeinated === "Yes").length;

      document.getElementById("todayOunces").textContent = todayOunces;
      document.getElementById("todayCount").textContent = todaysEntries.length;
      document.getElementById("todayCaffeine").textContent = todayCaffeine;
    }

    function saveEntry() {
      const name = drinkNameInput.value.trim() || "Unnamed Drink";
      const manualOunces = manualOuncesInput.value ? Number(manualOuncesInput.value) : null;
      const ounces = manualOunces || selectedOunces;

      if (!ounces || ounces <= 0) {
        alert("Please choose or enter the number of ounces.");
        return;
      }

      if (!selectedCaffeine) {
        alert("Please select whether it is caffeinated.");
        return;
      }

      if (!selectedClear) {
        alert("Please select whether it is clear.");
        return;
      }

      const entryData = {
        id: editingId || Date.now(),
        name,
        ounces,
        caffeinated: selectedCaffeine,
        clear: selectedClear,
        createdAt: editingId
          ? entries.find(entry => entry.id === editingId)?.createdAt || new Date().toISOString()
          : new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      if (editingId) {
        entries = entries.map(entry => entry.id === editingId ? entryData : entry);
      } else {
        entries.push(entryData);
      }

      saveEntries();
      resetForm();
      renderEntries();
    }

    function editEntry(id) {
      const entry = entries.find(entry => entry.id === id);
      if (!entry) return;

      editingId = id;
      drinkNameInput.value = entry.name;
      manualOuncesInput.value = entry.ounces;

      selectedOunces = null;
      selectedCaffeine = entry.caffeinated;
      selectedClear = entry.clear;

      document.querySelectorAll("#ounceButtons button").forEach(button => button.classList.remove("selected"));
      selectButton("caffeineButtons", selectedCaffeine);
      selectButton("clearButtons", selectedClear);

      saveBtn.textContent = "Save Changes";
      saveBtn.classList.add("editing");
      cancelEditBtn.style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteEntry(id) {
      const entry = entries.find(entry => entry.id === id);
      const label = entry ? `${entry.name} — ${entry.ounces} oz` : "this entry";

      if (!confirm(`Delete ${label}?`)) return;

      entries = entries.filter(entry => entry.id !== id);
      saveEntries();

      if (editingId === id) resetForm();

      renderEntries();
    }

    function clearAllEntries() {
      if (!entries.length) return;
      if (!confirm("Delete all saved entries? This cannot be undone.")) return;

      entries = [];
      saveEntries();
      resetForm();
      renderEntries();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    saveBtn.addEventListener("click", saveEntry);
    cancelEditBtn.addEventListener("click", resetForm);
    document.getElementById("clearAllBtn").addEventListener("click", clearAllEntries);

    renderEntries();
  </script>
</body>
</html>
