<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Diet Coke Addiction</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{
  --red:#b30000;
  --blue:#075aaa;
  --dark:#222;
  --muted:#666;
  --border:#ddd;
  --bg:#f6f6f6;
  --card:#fff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--dark);
  padding:18px 14px 40px;
}
.app{max-width:520px;margin:0 auto}
header{text-align:center;margin-bottom:14px}
.logo{
  width:112px;
  height:112px;
  border-radius:28px;
  object-fit:cover;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
}
h1{margin:12px 0 4px;font-size:30px;color:var(--red)}
.subtitle{font-size:13px;color:var(--muted)}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.06);
}
.section-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.summary,.report-results{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
}
.summary-box,.report-box{
  background:#fafafa;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px 6px;
  text-align:center;
}
.summary-box strong{display:block;font-size:19px;color:var(--red)}
.report-box strong{display:block;font-size:19px;color:var(--blue)}
.summary-box span,.report-box span{font-size:10px;color:var(--muted)}
label{display:block;font-weight:700;margin-bottom:8px;font-size:15px}
input{
  width:100%;
  padding:13px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:16px;
  margin-bottom:14px;
  background:#fff;
}
.button-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:14px;
}
.oz-btn,.report-btn,.plain-btn{
  padding:11px 0;
  border:none;
  border-radius:13px;
  background:#ececec;
  font-weight:700;
  font-size:13px;
  color:var(--dark);
}
.selected{background:var(--red)!important;color:#fff!important}
.toggle{
  display:flex;
  background:#ececec;
  border-radius:22px;
  padding:2px;
  margin-bottom:14px;
}
.toggle button{
  flex:1;
  padding:11px 0;
  border:none;
  background:transparent;
  border-radius:20px;
  font-weight:700;
  font-size:15px;
}
.primary{
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  background:var(--red);
  color:#fff;
  font-size:18px;
  font-weight:700;
  margin-top:4px;
}
.secondary{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#444;
  color:#fff;
  font-weight:700;
  margin-top:10px;
}
.report-main{
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  background:var(--blue);
  color:#fff;
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
}
.back-btn{
  border:none;
  border-radius:12px;
  background:#444;
  color:#fff;
  padding:10px 14px;
  font-weight:700;
  margin-bottom:12px;
}
.quick-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.quick-btn{
  width:100%;
  border:none;
  border-radius:16px;
  background:var(--blue);
  color:#fff;
  text-align:left;
  padding:15px 16px;
}
.quick-btn strong{display:block;font-size:17px}
.quick-btn span{display:block;font-size:12px;margin-top:4px;color:#e8f1ff}
.custom-btn{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  background:#fff;
  text-align:left;
  padding:14px 16px;
  margin-bottom:10px;
}
.custom-btn strong{display:block;font-size:16px}
.custom-btn span{display:block;font-size:12px;margin-top:4px;color:var(--muted)}
.breakdown-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid #eee;
  padding:9px 0;
  font-size:14px;
}
.breakdown-row:last-child{border-bottom:none}
.entry{
  border-bottom:1px solid var(--border);
  padding:12px 0;
}
.entry:last-child{border-bottom:none}
.entry-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}
.entry-title{font-weight:800;font-size:16px}
.entry-meta{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
  line-height:1.4;
}
.entry-actions{display:flex;gap:6px;flex-shrink:0}
.small-btn{
  padding:8px 10px;
  border:none;
  border-radius:10px;
  font-size:12px;
  font-weight:700;
}
.edit-btn{background:#e8f1ff;color:#0652aa}
.delete-btn{background:#ffe8e8;color:#a40000}
.empty{text-align:center;color:var(--muted);padding:10px}
.collapse-btn{
  width:100%;
  border:1px solid var(--border);
  background:#fafafa;
  border-radius:14px;
  padding:12px;
  font-weight:700;
  color:var(--dark);
}
.page{display:none}
.page.active{display:block}
.helper{font-size:12px;color:var(--muted);margin-top:-6px;margin-bottom:10px}
</style>
</head>
<body>

<div id="mainPage" class="page active">
<div class="app">
<header>
<img src="icon.png" class="logo" alt="My Diet Coke Addiction icon">
<h1>My Diet Coke Addiction</h1>
<div class="subtitle">Private drink tracker saved on this device</div>
</header>

<div class="card">
<div class="section-title">Today</div>
<div class="summary">
<div class="summary-box"><strong id="ouncesTotal">0</strong><span>oz</span></div>
<div class="summary-box"><strong id="entryTotal">0</strong><span>entries</span></div>
<div class="summary-box"><strong id="caffeineTotal">0</strong><span>caf</span></div>
<div class="summary-box"><strong id="caffeineOzTotal">0</strong><span>caf oz</span></div>
</div>
</div>

<button class="report-main" id="viewReportsBtn">View Reports</button>

<div class="card">
<label>Drink Name</label>
<input id="drinkName" placeholder="Example: Diet Coke">

<label>Ounces</label>
<div class="button-row">
<button class="oz-btn" data-oz="8">8 oz</button>
<button class="oz-btn" data-oz="12">12 oz</button>
<button class="oz-btn" data-oz="16">16 oz</button>
<button class="oz-btn" data-oz="20">20 oz</button>
</div>

<label>Manual Ounces</label>
<input id="manualOz" type="number" placeholder="Or type a number">

<label>Caffeinated?</label>
<div class="toggle" id="caffeineToggle">
<button data-value="Yes">Yes</button>
<button data-value="No">No</button>
</div>

<label>Clear?</label>
<div class="toggle" id="clearToggle">
<button data-value="Yes">Yes</button>
<button data-value="No">No</button>
</div>

<button class="primary" id="saveBtn">Save Entry</button>
<button class="secondary" id="cancelBtn" style="display:none;">Cancel Edit</button>
</div>

<div class="card">
<div class="section-title"><span>Today's Entries</span><span id="todayEntryCount">(0)</span></div>
<button class="collapse-btn" id="toggleTodayEntries">▶ Show Today's Entries</button>
<div id="todayEntries" style="display:none;"></div>
</div>
</div>
</div>

<div id="reportsHomePage" class="page">
<div class="app">
<button class="back-btn" id="backToMainFromHome">← Back</button>
<header>
<h1>Reports</h1>
<div class="subtitle">Quick totals and historical entries</div>
</header>

<div class="card">
<div class="section-title">Quick Reports</div>
<div class="quick-grid">
<button class="quick-btn" data-report="yesterday"><strong>Yesterday</strong><span>Day total for the previous day</span></button>
<button class="quick-btn" data-report="lastWeek"><strong>Last Week</strong><span>Totals for the previous week</span></button>
<button class="quick-btn" data-report="lastMonth"><strong>Last Month</strong><span>Totals for the previous month</span></button>
</div>
</div>

<div class="card">
<div class="section-title">Custom Reports</div>
<button class="custom-btn" data-report="customDay"><strong>Custom Day</strong><span>Pick any specific date</span></button>
<button class="custom-btn" data-report="customWeek"><strong>Custom Week</strong><span>Pick any week</span></button>
<button class="custom-btn" data-report="customMonth"><strong>Custom Month</strong><span>Pick any month</span></button>
</div>
</div>
</div>

<div id="reportDetailPage" class="page">
<div class="app">
<button class="back-btn" id="backToReportsHome">← Back</button>
<header>
<h1 id="reportTitle">Report</h1>
<div class="subtitle" id="reportSubtitle"></div>
</header>

<div class="card" id="customControls" style="display:none;">
<div id="customDayControl" style="display:none;">
<label for="customDayInput">Select Day</label>
<input id="customDayInput" type="date">
</div>
<div id="customWeekControl" style="display:none;">
<label for="customWeekInput">Select Week</label>
<input id="customWeekInput" type="week">
</div>
<div id="customMonthControl" style="display:none;">
<label for="customMonthInput">Select Month</label>
<input id="customMonthInput" type="month">
</div>
</div>

<div class="card">
<div class="section-title" id="reportPeriodLabel">Totals</div>
<div class="report-results">
<div class="report-box"><strong id="reportOunces">0</strong><span>oz</span></div>
<div class="report-box"><strong id="reportEntries">0</strong><span>entries</span></div>
<div class="report-box"><strong id="reportCaffeine">0</strong><span>caf</span></div>
<div class="report-box"><strong id="reportCaffeineOz">0</strong><span>caf oz</span></div>
</div>
</div>

<div class="card">
<div class="section-title">Drink Breakdown</div>
<div id="drinkBreakdown"></div>
</div>

<div class="card">
<div class="section-title"><span>Report Entries</span><span id="reportEntryCount">(0)</span></div>
<button class="collapse-btn" id="toggleReportEntries">▶ Show Report Entries</button>
<div id="reportEntriesList" style="display:none;"></div>
</div>
</div>
</div>

<script>
const STORAGE_KEYS = ["dietCokeTracker","myDietCokeAddictionEntries"];
let entries = [];

for (const key of STORAGE_KEYS) {
  const saved = JSON.parse(localStorage.getItem(key) || "[]");
  if (saved.length) {
    entries = saved;
    break;
  }
}

let selectedOz = null;
let caffeine = null;
let clearDrink = null;
let editingId = null;
let currentReportType = "yesterday";
let todayEntriesExpanded = false;
let reportEntriesExpanded = false;

function saveStorage(){
  localStorage.setItem("dietCokeTracker", JSON.stringify(entries));
  localStorage.setItem("myDietCokeAddictionEntries", JSON.stringify(entries));
}

function pad(n){ return String(n).padStart(2,"0"); }
function localDateString(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d){ const x = new Date(d); x.setHours(23,59,59,999); return x; }

function getYesterday(){
  const d = new Date();
  d.setDate(d.getDate()-1);
  return d;
}

function getStartOfWeekSunday(date){
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  d.setHours(0,0,0,0);
  return d;
}

function getEndOfWeekSunday(date){
  const start = getStartOfWeekSunday(date);
  const end = new Date(start);
  end.setDate(start.getDate()+6);
  end.setHours(23,59,59,999);
  return end;
}

function getPreviousWeekRange(){
  const d = new Date();
  d.setDate(d.getDate() - 7);
  return [getStartOfWeekSunday(d), getEndOfWeekSunday(d)];
}

function getPreviousMonthRange(){
  const d = new Date();
  d.setMonth(d.getMonth()-1);
  return [new Date(d.getFullYear(), d.getMonth(), 1), new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59,999)];
}

function getWeekNumber(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
  return `${d.getUTCFullYear()}-W${pad(weekNo)}`;
}

function getRangeForWeekValue(value){
  const [year, week] = value.split("-W").map(Number);
  const jan4 = new Date(year, 0, 4);
  const start = getStartOfWeekSunday(jan4);
  start.setDate(start.getDate() + (week - 1) * 7);
  const end = new Date(start);
  end.setDate(start.getDate()+6);
  end.setHours(23,59,59,999);
  return [start, end];
}

function formatRange(start,end){
  if (start.toDateString() === end.toDateString()) return start.toLocaleDateString();
  return `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
}

function showPage(pageId){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
  window.scrollTo({top:0, behavior:"smooth"});
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function updateSummary(){
  const today = new Date().toLocaleDateString();
  const todays = entries.filter(e => new Date(e.createdAt).toLocaleDateString() === today);
  document.getElementById("ouncesTotal").textContent = todays.reduce((s,e)=>s+Number(e.ounces),0);
  document.getElementById("entryTotal").textContent = todays.length;
  document.getElementById("caffeineTotal").textContent = todays.filter(e=>e.caffeinated==="Yes").length;
  document.getElementById("caffeineOzTotal").textContent = todays.filter(e=>e.caffeinated==="Yes").reduce((s,e)=>s+Number(e.ounces),0);
}

function renderEntryList(list){
  if (!list.length) return '<div class="empty">No entries found.</div>';

  return list.map(entry => `
    <div class="entry">
      <div class="entry-top">
        <div>
          <div class="entry-title">${escapeHtml(entry.name)} — ${entry.ounces} oz</div>
          <div class="entry-meta">
            Caffeinated: ${entry.caffeinated} · Clear: ${entry.clear}<br>
            ${new Date(entry.createdAt).toLocaleString()}
          </div>
        </div>
        <div class="entry-actions">
          <button class="small-btn edit-btn" onclick="editEntry(${entry.id})">Edit</button>
          <button class="small-btn delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join("");
}

function renderTodayEntries(){
  const today = new Date().toLocaleDateString();
  const todays = entries
    .filter(e => new Date(e.createdAt).toLocaleDateString() === today)
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  document.getElementById("todayEntryCount").textContent = `(${todays.length})`;
  document.getElementById("todayEntries").innerHTML = renderEntryList(todays);
  document.getElementById("toggleTodayEntries").textContent =
    todayEntriesExpanded ? "▼ Hide Today's Entries" : "▶ Show Today's Entries";
  document.getElementById("todayEntries").style.display = todayEntriesExpanded ? "block" : "none";
}

function calculateReport(start,end){
  const filtered = entries
    .filter(e => {
      const d = new Date(e.createdAt);
      return d >= start && d <= end;
    })
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const caffeinated = filtered.filter(e=>e.caffeinated==="Yes");

  return {
    list: filtered,
    ounces: filtered.reduce((s,e)=>s+Number(e.ounces),0),
    count: filtered.length,
    caffeine: caffeinated.length,
    caffeineOz: caffeinated.reduce((s,e)=>s+Number(e.ounces),0)
  };
}

function getDrinkBreakdown(list){
  const totals = {};
  list.forEach(e => {
    totals[e.name] = (totals[e.name] || 0) + Number(e.ounces);
  });
  return Object.entries(totals).sort((a,b)=>b[1]-a[1]);
}

function renderReport(){
  let start, end, title, subtitle;
  document.getElementById("customControls").style.display = "none";
  document.getElementById("customDayControl").style.display = "none";
  document.getElementById("customWeekControl").style.display = "none";
  document.getElementById("customMonthControl").style.display = "none";

  if (currentReportType === "yesterday") {
    const y = getYesterday();
    start = startOfDay(y); end = endOfDay(y);
    title = "Yesterday"; subtitle = start.toLocaleDateString();
  }

  if (currentReportType === "lastWeek") {
    [start,end] = getPreviousWeekRange();
    title = "Last Week"; subtitle = formatRange(start,end);
  }

  if (currentReportType === "lastMonth") {
    [start,end] = getPreviousMonthRange();
    title = "Last Month";
    subtitle = start.toLocaleDateString(undefined,{month:"long", year:"numeric"});
  }

  if (currentReportType === "customDay") {
    document.getElementById("customControls").style.display = "block";
    document.getElementById("customDayControl").style.display = "block";
    const value = document.getElementById("customDayInput").value || localDateString(getYesterday());
    document.getElementById("customDayInput").value = value;
    start = new Date(value + "T00:00:00");
    end = new Date(value + "T23:59:59");
    title = "Custom Day"; subtitle = start.toLocaleDateString();
  }

  if (currentReportType === "customWeek") {
    document.getElementById("customControls").style.display = "block";
    document.getElementById("customWeekControl").style.display = "block";
    const value = document.getElementById("customWeekInput").value || getWeekNumber(new Date());
    document.getElementById("customWeekInput").value = value;
    [start,end] = getRangeForWeekValue(value);
    title = "Custom Week"; subtitle = formatRange(start,end);
  }

  if (currentReportType === "customMonth") {
    document.getElementById("customControls").style.display = "block";
    document.getElementById("customMonthControl").style.display = "block";
    const d = new Date();
    const defaultMonth = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    const value = document.getElementById("customMonthInput").value || defaultMonth;
    document.getElementById("customMonthInput").value = value;
    const [year, month] = value.split("-").map(Number);
    start = new Date(year, month-1, 1);
    end = new Date(year, month, 0, 23,59,59,999);
    title = "Custom Month"; subtitle = start.toLocaleDateString(undefined,{month:"long", year:"numeric"});
  }

  const report = calculateReport(start,end);

  document.getElementById("reportTitle").textContent = title;
  document.getElementById("reportSubtitle").textContent = subtitle;
  document.getElementById("reportPeriodLabel").textContent = "Totals";
  document.getElementById("reportOunces").textContent = report.ounces;
  document.getElementById("reportEntries").textContent = report.count;
  document.getElementById("reportCaffeine").textContent = report.caffeine;
  document.getElementById("reportCaffeineOz").textContent = report.caffeineOz;
  document.getElementById("reportEntryCount").textContent = `(${report.count})`;

  const breakdown = getDrinkBreakdown(report.list);
  document.getElementById("drinkBreakdown").innerHTML = breakdown.length
    ? breakdown.map(([name, oz]) => `<div class="breakdown-row"><strong>${escapeHtml(name)}</strong><span>${oz} oz</span></div>`).join("")
    : '<div class="empty">No drink data for this report.</div>';

  document.getElementById("reportEntriesList").innerHTML = renderEntryList(report.list);
  document.getElementById("toggleReportEntries").textContent =
    reportEntriesExpanded ? "▼ Hide Report Entries" : "▶ Show Report Entries";
  document.getElementById("reportEntriesList").style.display = reportEntriesExpanded ? "block" : "none";
}

function refreshAll(){
  updateSummary();
  renderTodayEntries();
  renderReport();
}

document.querySelectorAll(".oz-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.getElementById("manualOz").value = "";
    document.querySelectorAll(".oz-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedOz = Number(btn.dataset.oz);
  });
});

document.getElementById("manualOz").addEventListener("input",()=>{
  if(document.getElementById("manualOz").value){
    document.querySelectorAll(".oz-btn").forEach(b=>b.classList.remove("selected"));
    selectedOz = null;
  }
});

function setupToggle(id, setter){
  document.querySelectorAll(`#${id} button`).forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(`#${id} button`).forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      setter(btn.dataset.value);
    });
  });
}

setupToggle("caffeineToggle", v=>caffeine=v);
setupToggle("clearToggle", v=>clearDrink=v);

function resetForm(){
  document.getElementById("drinkName").value = "";
  document.getElementById("manualOz").value = "";
  document.querySelectorAll(".oz-btn,.toggle button").forEach(el=>el.classList.remove("selected"));
  selectedOz = null;
  caffeine = null;
  clearDrink = null;
  editingId = null;
  document.getElementById("saveBtn").textContent = "Save Entry";
  document.getElementById("cancelBtn").style.display = "none";
}

function saveEntry(){
  const name = document.getElementById("drinkName").value.trim() || "Unnamed Drink";
  const manual = document.getElementById("manualOz").value;
  const ounces = manual || selectedOz;

  if(!ounces){ alert("Please enter ounces."); return; }
  if(!caffeine){ alert("Select caffeine option."); return; }
  if(!clearDrink){ alert("Select clear option."); return; }

  const existing = editingId ? entries.find(e=>e.id===editingId) : null;

  const entry = {
    id: editingId || Date.now(),
    name,
    ounces,
    caffeinated: caffeine,
    clear: clearDrink,
    createdAt: existing ? existing.createdAt : new Date().toISOString()
  };

  entries = editingId ? entries.map(e=>e.id===editingId ? entry : e) : [...entries, entry];
  saveStorage();
  resetForm();
  refreshAll();
}

function editEntry(id){
  const e = entries.find(x=>x.id===id);
  if(!e) return;

  editingId = id;
  document.getElementById("drinkName").value = e.name;
  document.getElementById("manualOz").value = e.ounces;
  caffeine = e.caffeinated;
  clearDrink = e.clear;

  document.querySelectorAll(".oz-btn,.toggle button").forEach(el=>el.classList.remove("selected"));
  document.querySelectorAll("#caffeineToggle button").forEach(b=>{ if(b.dataset.value===caffeine) b.classList.add("selected"); });
  document.querySelectorAll("#clearToggle button").forEach(b=>{ if(b.dataset.value===clearDrink) b.classList.add("selected"); });

  document.getElementById("saveBtn").textContent = "Save Changes";
  document.getElementById("cancelBtn").style.display = "block";

  showPage("mainPage");
}

function deleteEntry(id){
  if(!confirm("Delete this entry?")) return;
  entries = entries.filter(e=>e.id!==id);
  saveStorage();
  if(editingId === id) resetForm();
  refreshAll();
}

document.getElementById("saveBtn").addEventListener("click", saveEntry);
document.getElementById("cancelBtn").addEventListener("click", resetForm);

document.getElementById("viewReportsBtn").addEventListener("click", ()=>showPage("reportsHomePage"));
document.getElementById("backToMainFromHome").addEventListener("click", ()=>showPage("mainPage"));
document.getElementById("backToReportsHome").addEventListener("click", ()=>showPage("reportsHomePage"));

document.querySelectorAll("[data-report]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    currentReportType = btn.dataset.report;
    reportEntriesExpanded = false;
    renderReport();
    showPage("reportDetailPage");
  });
});

document.getElementById("toggleTodayEntries").addEventListener("click", ()=>{
  todayEntriesExpanded = !todayEntriesExpanded;
  renderTodayEntries();
});

document.getElementById("toggleReportEntries").addEventListener("click", ()=>{
  reportEntriesExpanded = !reportEntriesExpanded;
  renderReport();
});

document.getElementById("customDayInput").addEventListener("change", renderReport);
document.getElementById("customWeekInput").addEventListener("change", renderReport);
document.getElementById("customMonthInput").addEventListener("change", renderReport);

document.getElementById("customDayInput").value = localDateString(getYesterday());
document.getElementById("customWeekInput").value = getWeekNumber(new Date());
const now = new Date();
document.getElementById("customMonthInput").value = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;

refreshAll();
</script>
</body>
</html>
