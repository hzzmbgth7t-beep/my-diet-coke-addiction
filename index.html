<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Diet Coke Addiction</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
:root{
--red:#b30000;
--dark:#222;
--muted:#666;
--border:#ddd;
--bg:#f6f6f6;
--card:#fff;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:var(--bg);
color:var(--dark);
padding:18px 14px 40px;
}

.app{
max-width:520px;
margin:0 auto;
}

header{
text-align:center;
margin-bottom:14px;
}

.logo{
width:112px;
height:112px;
border-radius:28px;
object-fit:cover;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

h1{
margin:12px 0 4px;
font-size:30px;
color:var(--red);
}

.subtitle{
font-size:13px;
color:var(--muted);
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:16px;
margin-bottom:14px;
box-shadow:0 6px 16px rgba(0,0,0,.06);
}

.section-title{
font-size:15px;
font-weight:700;
margin-bottom:12px;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:9px;
}

.summary-box{
background:#fafafa;
border:1px solid var(--border);
border-radius:16px;
padding:12px 6px;
text-align:center;
}

.summary-box strong{
display:block;
font-size:22px;
color:var(--red);
}

.summary-box span{
font-size:11px;
color:var(--muted);
}

label{
display:block;
font-weight:700;
margin-bottom:8px;
font-size:15px;
}

input{
width:100%;
padding:13px 14px;
border-radius:14px;
border:1px solid var(--border);
font-size:16px;
margin-bottom:14px;
}

.button-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:14px;
}

.oz-btn{
padding:11px 0;
border:none;
border-radius:13px;
background:#ececec;
font-weight:700;
font-size:13px;
}

.selected{
background:var(--red)!important;
color:#fff!important;
}

.toggle{
display:flex;
background:#ececec;
border-radius:22px;
padding:2px;
margin-bottom:14px;
}

.toggle button{
flex:1;
padding:11px 0;
border:none;
background:transparent;
border-radius:20px;
font-weight:700;
font-size:15px;
}

.primary{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:var(--red);
color:#fff;
font-size:18px;
font-weight:700;
margin-top:4px;
}

.secondary{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#444;
color:#fff;
font-weight:700;
margin-top:10px;
}

.entry{
border-bottom:1px solid var(--border);
padding:12px 0;
}

.entry:last-child{
border-bottom:none;
}

.entry-top{
display:flex;
justify-content:space-between;
gap:10px;
}

.entry-title{
font-weight:800;
font-size:16px;
}

.entry-meta{
font-size:13px;
color:var(--muted);
margin-top:4px;
line-height:1.4;
}

.entry-actions{
display:flex;
gap:6px;
}

.small-btn{
padding:8px 10px;
border:none;
border-radius:10px;
font-size:12px;
font-weight:700;
}

.edit-btn{
background:#e8f1ff;
color:#0652aa;
}

.delete-btn{
background:#ffe8e8;
color:#a40000;
}

.empty{
text-align:center;
color:var(--muted);
padding:10px;
}
</style>
</head>

<body>
<div class="app">

<header>
<img src="icon.png" class="logo">
<h1>My Diet Coke Addiction</h1>
<div class="subtitle">Private drink tracker saved on this device</div>
</header>

<div class="card">
<div class="section-title">Today</div>

<div class="summary">
<div class="summary-box">
<strong id="ouncesTotal">0</strong>
<span>ounces</span>
</div>

<div class="summary-box">
<strong id="entryTotal">0</strong>
<span>entries</span>
</div>

<div class="summary-box">
<strong id="caffeineTotal">0</strong>
<span>caffeinated</span>
</div>
</div>
</div>

<div class="card">

<label>Drink Name</label>
<input id="drinkName" placeholder="Example: Diet Coke">

<label>Ounces</label>

<div class="button-row">
<button class="oz-btn" data-oz="8">8 oz</button>
<button class="oz-btn" data-oz="12">12 oz</button>
<button class="oz-btn" data-oz="16">16 oz</button>
<button class="oz-btn" data-oz="20">20 oz</button>
</div>

<label>Manual Ounces</label>
<input id="manualOz" type="number" placeholder="Or type a number">

<label>Caffeinated?</label>

<div class="toggle" id="caffeineToggle">
<button data-value="Yes">Yes</button>
<button data-value="No">No</button>
</div>

<label>Clear?</label>

<div class="toggle" id="clearToggle">
<button data-value="Yes">Yes</button>
<button data-value="No">No</button>
</div>

<button class="primary" id="saveBtn">Save Entry</button>
<button class="secondary" id="cancelBtn" style="display:none;">Cancel Edit</button>

</div>

<div class="card">
<div class="section-title">Saved Entries</div>

<div id="entries"></div>

<button class="secondary" id="clearAllBtn">Delete All Entries</button>
</div>

</div>

<script>
const STORAGE_KEY = "dietCokeTracker";

let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

let selectedOz = null;
let caffeine = null;
let clearDrink = null;
let editingId = null;

const entriesDiv = document.getElementById("entries");

function saveStorage(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function updateSummary(){
const today = new Date().toLocaleDateString();

const todays = entries.filter(e =>
new Date(e.createdAt).toLocaleDateString() === today
);

document.getElementById("ouncesTotal").textContent =
todays.reduce((sum,e)=>sum + Number(e.ounces),0);

document.getElementById("entryTotal").textContent =
todays.length;

document.getElementById("caffeineTotal").textContent =
todays.filter(e=>e.caffeinated==="Yes").length;
}

function renderEntries(){

entries.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

if(!entries.length){
entriesDiv.innerHTML = '<div class="empty">No entries yet.</div>';
updateSummary();
return;
}

entriesDiv.innerHTML = entries.map(entry => `
<div class="entry">
<div class="entry-top">

<div>
<div class="entry-title">${entry.name} — ${entry.ounces} oz</div>

<div class="entry-meta">
Caffeinated: ${entry.caffeinated} · Clear: ${entry.clear}<br>
${new Date(entry.createdAt).toLocaleString()}
</div>
</div>

<div class="entry-actions">
<button class="small-btn edit-btn" onclick="editEntry(${entry.id})">Edit</button>
<button class="small-btn delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
</div>

</div>
</div>
`).join("");

updateSummary();
}

document.querySelectorAll(".oz-btn").forEach(btn=>{
btn.addEventListener("click",()=>{

document.getElementById("manualOz").value = "";

document.querySelectorAll(".oz-btn").forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

selectedOz = Number(btn.dataset.oz);
});
});

document.getElementById("manualOz").addEventListener("input",()=>{
if(document.getElementById("manualOz").value){
document.querySelectorAll(".oz-btn").forEach(b=>b.classList.remove("selected"));
selectedOz = null;
}
});

function setupToggle(id, setter){

const buttons = document.querySelectorAll(`#${id} button`);

buttons.forEach(btn=>{
btn.addEventListener("click",()=>{

buttons.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

setter(btn.dataset.value);

});
});
}

setupToggle("caffeineToggle", value=>caffeine=value);
setupToggle("clearToggle", value=>clearDrink=value);

function resetForm(){

document.getElementById("drinkName").value = "";
document.getElementById("manualOz").value = "";

document.querySelectorAll(".selected").forEach(el=>el.classList.remove("selected"));

selectedOz = null;
caffeine = null;
clearDrink = null;
editingId = null;

document.getElementById("saveBtn").textContent = "Save Entry";
document.getElementById("cancelBtn").style.display = "none";
}

function saveEntry(){

const name =
document.getElementById("drinkName").value.trim() || "Unnamed Drink";

const manual =
document.getElementById("manualOz").value;

const ounces = manual || selectedOz;

if(!ounces){
alert("Please enter ounces.");
return;
}

if(!caffeine){
alert("Select caffeine option.");
return;
}

if(!clearDrink){
alert("Select clear option.");
return;
}

const entry = {
id: editingId || Date.now(),
name,
ounces,
caffeinated:caffeine,
clear:clearDrink,
createdAt: editingId ?
entries.find(e=>e.id===editingId).createdAt :
new Date().toISOString()
};

if(editingId){
entries = entries.map(e=>e.id===editingId ? entry : e);
}else{
entries.push(entry);
}

saveStorage();
resetForm();
renderEntries();
}

function editEntry(id){

const entry = entries.find(e=>e.id===id);

editingId = id;

document.getElementById("drinkName").value = entry.name;
document.getElementById("manualOz").value = entry.ounces;

caffeine = entry.caffeinated;
clearDrink = entry.clear;

document.querySelectorAll(".selected").forEach(el=>el.classList.remove("selected"));

document.querySelectorAll("#caffeineToggle button").forEach(btn=>{
if(btn.dataset.value===caffeine){
btn.classList.add("selected");
}
});

document.querySelectorAll("#clearToggle button").forEach(btn=>{
if(btn.dataset.value===clearDrink){
btn.classList.add("selected");
}
});

document.getElementById("saveBtn").textContent = "Save Changes";
document.getElementById("cancelBtn").style.display = "block";

window.scrollTo({top:0,behavior:"smooth"});
}

function deleteEntry(id){

if(!confirm("Delete this entry?")) return;

entries = entries.filter(e=>e.id!==id);

saveStorage();
renderEntries();
}

document.getElementById("clearAllBtn").addEventListener("click",()=>{

if(!confirm("Delete all entries?")) return;

entries = [];

saveStorage();
renderEntries();
});

document.getElementById("saveBtn").addEventListener("click",saveEntry);

document.getElementById("cancelBtn").addEventListener("click",resetForm);

renderEntries();
</script>

</body>
</html>
